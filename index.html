<style>
  :root{
    --ink:#0A1120;--ink2:#0F1A2E;--ink3:#16243E;--card:rgba(24,38,64,.72);
    --line:#26365A;--line2:#32466e;--orange:#FF9900;--orange2:#EC7211;
    --text:#EAF1FB;--muted:#90A4C6;--muted2:#6C7E9F;
    --rt:#FF9900;--mem:#B388FF;--gw:#4FC3F7;--id:#5CD6A0;--obs:#FFC04D;--pol:#FF7AA2;--mcp:#7FE1C0;--skill:#FFD166;--ci:#6CC4FF;--br:#C792EA;
    --ui:'Sora',ui-sans-serif,system-ui,sans-serif;--body:'Manrope',ui-sans-serif,system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);height:100vh;display:flex;flex-direction:column;color:var(--text);background:var(--ink);overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(900px 600px at 12% -8%,rgba(255,153,0,.16),transparent 60%),radial-gradient(1000px 700px at 102% 110%,rgba(79,195,247,.14),transparent 55%),radial-gradient(700px 500px at 60% 50%,rgba(179,136,255,.06),transparent 60%)}
  header,main{position:relative;z-index:1}
  header{display:flex;align-items:center;gap:14px;padding:14px 22px;flex-shrink:0;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(15,26,46,.9),rgba(10,17,32,.6));backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:34px;height:34px;border-radius:9px;overflow:hidden;display:grid;place-items:center;box-shadow:0 4px 16px rgba(1,168,141,.4)}
  .brand h1{font-family:var(--ui);font-size:18px;font-weight:700;letter-spacing:-.2px;line-height:1}
  .brand .sub{font-size:11.5px;color:var(--muted);margin-top:2px;letter-spacing:.3px}
  .spacer{flex:1}
  .pill{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line);padding:6px 12px;border-radius:99px}

const canvas=document.getElementById('canvas');
/* ===== 视图变换（演示/缩放/平移）===== */
let viewX=0,viewY=0,viewScale=1,demoMode=false;
function applyView(){canvas.style.transformOrigin='0 0';canvas.style.transform=`translate(${viewX}px,${viewY}px) scale(${viewScale})`;
  const zl=document.getElementById('zlbl');if(zl)zl.textContent=Math.round(viewScale*100)+'%';
  if(sel){const n=nodes.find(x=>x.id===sel),pop=document.getElementById('pop');if(n&&pop&&!pop.hidden)positionPop(n)}}
function resetView(){viewX=0;viewY=0;viewScale=1;applyView()}
function zoomBy(f){const w=canvas.parentElement,ww=w.clientWidth,wh=w.clientHeight,cx=ww/2,cy=wh/2;
  const lx=(cx-viewX)/viewScale,ly=(cy-viewY)/viewScale;
  viewScale=Math.min(Math.max(viewScale*f,.2),2.5);viewX=cx-lx*viewScale;viewY=cy-ly*viewScale;applyView()}
function fitView(boost){const ns=[...canvas.querySelectorAll('.node')],w=canvas.parentElement,ww=w.clientWidth,wh=w.clientHeight;
  if(!ns.length){resetView();return}
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  ns.forEach(el=>{const x=el.offsetLeft,y=el.offsetTop;minX=Math.min(minX,x);minY=Math.min(minY,y);maxX=Math.max(maxX,x+el.offsetWidth);maxY=Math.max(maxY,y+el.offsetHeight)});
  const pad=70,bw=Math.max(1,maxX-minX),bh=Math.max(1,maxY-minY);
  let s=Math.min((ww-pad*2)/bw,(wh-pad*2)/bh);s=Math.min(s*(boost||1),2.2);s=Math.max(s,.2);
  viewScale=s;viewX=(ww-bw*s)/2-minX*s;viewY=(wh-bh*s)/2-minY*s;applyView()}
function toggleDemo(){demoMode=!demoMode;document.body.classList.toggle('demo',demoMode);
  const b=document.getElementById('demoBtn');if(b)b.textContent=demoMode?'🖥 退出演示':'🖥 演示模式';
  if(demoMode)setTimeout(()=>fitView(1.1),60);else resetView()}
function toggleFull(){if(!document.fullscreenElement){(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement)}else{document.exitFullscreen&&document.exitFullscreen()}}
canvas.parentElement.addEventListener('wheel',e=>{e.preventDefault();const r=canvas.parentElement.getBoundingClientRect(),px=e.clientX-r.left,py=e.clientY-r.top;
  const lx=(px-viewX)/viewScale,ly=(py-viewY)/viewScale,f=e.deltaY<0?1.12:0.89;
  viewScale=Math.min(Math.max(viewScale*f,.2),2.5);viewX=px-lx*viewScale;viewY=py-ly*viewScale;applyView()},{passive:false});
document.addEventListener('keydown',e=>{const t=document.activeElement,tag=t&&t.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||(t&&t.isContentEditable))return;

function addNode(type,x,y){
  const c=COMPONENTS[type];
  if(!c.multi&&nodes.some(n=>n.type===type)){toast('只能有一个 '+c.label);return}
  if(c.parent==='gateway'&&!nodes.some(n=>n.type==='gateway')){toast('请先添加 Gateway — MCP/Skill 是它的工具目标');return}
  const cfg={};c.fields.forEach(f=>cfg[f.k]=f.d);
  if(c.multi){const k=c.fields[0].k;cfg[k]=cfg[k]+'_'+(nodes.filter(n=>n.type===type).length+1)}
  const n={id:++nid,type,x:Math.max(10,x),y:Math.max(10,y),cfg};

function delNode(id){nodes=nodes.filter(n=>n.id!==id);if(sel===id)sel=null;published=false;render();renderProps()}

function isNum(v,min,max){const n=Number(v);return v!==''&&!isNaN(n)&&(min==null||n>=min)&&(max==null||n<=max)}
function isIncomplete(n){
  const c=n.cfg;
  switch(n.type){
    case'runtime':
      if(!isNum(c.max_tokens,1,200000))return 'max_tokens 需为正整数';
      if(!isNum(c.idle_timeout,60,28800))return 'idle_timeout 需 60-28800';
      if(!isNum(c.max_lifetime,60,28800))return 'max_lifetime 需 60-28800';
      if(c.env&&c.env.trim()&&!/^([A-Za-z_][A-Za-z0-9_]*=[^,]*)(,[A-Za-z_][A-Za-z0-9_]*=[^,]*)*$/.test(c.env.trim()))return '环境变量格式应为 KEY=val,KEY2=val2';
      break;
    case'memory':
      if(!c.mode||!c.mode.trim())return '需选择至少一种记忆模式';
      if(!c.strategy||!c.strategy.trim())return '需选择至少一种记忆策略';
      if(!isNum(c.top_k,1,100))return 'top-k 需为 1-100 整数';
      if(!isNum(c.expiry,1,365))return '保留天数需为 1-365';
      break;
    case'gateway':
      if(!c.gw_name||!c.gw_name.trim())return '需填写 Gateway 名称';
      if(/[^a-zA-Z0-9_-]/.test(c.gw_name))return 'Gateway 名称仅允许字母/数字/_/-';
      if(c.inbound_auth==='JWT'&&(!c.discovery_url||!c.discovery_url.trim()))return 'JWT 认证需填写 OIDC Discovery URL';
      break;
    case'mcp':
      if(!c.name||!c.name.trim())return '需填写工具名称';
      if(!c.endpoint||c.endpoint.includes('<')||!c.endpoint.trim())return '需填写目标资源';
      if(c.type==='lambda'&&!/^arn:aws[a-z-]*:lambda:/.test(c.endpoint))return 'lambda 类型需填 Lambda ARN';
      if((c.type==='openApiSchema'||c.type==='mcpServer')&&!/^https?:\/\//.test(c.endpoint))return c.type+' 类型需填 URL';
      if(c.type==='openApiSchema'&&(!c.schema||!c.schema.trim()))return 'openApiSchema 需提供 OpenAPI 规范';
      break;
    case'skill':
      if(!c.name||!c.name.trim())return '需填写技能名称';
      if(c.source_type==='path'&&(!c.source||!c.source.trim()))return '需填写文件/目录路径';
      if(c.source_type==='inline'&&(!c.code||!c.code.trim()))return '需填写技能代码';
      if(c.source_type==='upload'&&!c._zipdata)return '需上传含 SKILL.md 的 zip 包';
      break;
    case'identity':
      if(c.inbound_auth==='JWT'&&(!c.in_discovery_url||!c.in_discovery_url.trim()))return '入站 JWT 需填写 OIDC Discovery URL';
      if(c.outbound_auth==='oauth'){
        if(!c.provider_name||c.provider_name==='my_provider')return '出站 OAuth 需配置凭证提供方名称';
        if(!c.client_id||!c.client_id.trim())return '出站 OAuth 需填写 Client ID';
        if(!c.client_secret||!c.client_secret.trim())return '出站 OAuth 需填写 Client Secret';
      }
      if(c.outbound_auth==='apikey'){
        if(!c.provider_name||c.provider_name==='my_provider')return '出站 API Key 需配置凭证提供方名称';
        if(!c.api_key||!c.api_key.trim())return '出站 API Key 需填写 API Key';
      }
      if(!isNum(c.duration,60,43200))return 'Token 时长需 60-43200';
      break;
    case'policy':
      if(!c.engine||!c.engine.trim())return '需填写策略引擎名称';
      if(!c.pname||!c.pname.trim())return '需填写策略名称';
      if(c.authoring==='cedar'&&(!c.cedar||!c.cedar.trim()))return '需填写 Cedar 策略定义';
      if(c.authoring==='natural'&&(!c.nl_desc||!c.nl_desc.trim()))return '需填写自然语言策略描述';
      break;
    case'codeinterp':case'browser':
      if(!isNum(c.timeout,1,28800))return 'timeout 需为正整数';
      break;
    case'observability':
      if(!isNum(c.sampling==='1.0'?1:c.sampling,0,1)&&c.sampling!=='1.0')return '采样率需 0-1';
      break;
  }return null}

function newAgent(){

function summary(n){const c=n.cfg;switch(n.type){
  case'runtime':return `<span class="req">${c.name}</span> · ${c.framework}<br>${(c.model_id||'').split('.').pop().slice(0,18)}`;

  case'browser':return `net: ${c.network}`;

function drawEdges(rt){const svg=document.getElementById('edges');[...svg.querySelectorAll('path')].forEach(p=>p.remove());

    p.setAttribute('d',`M ${cx} ${cy} C ${cx+dx} ${cy}, ${x2-dx} ${y2}, ${x2} ${y2}`);
    p.setAttribute('fill','none');p.setAttribute('stroke','url(#eg)');p.setAttribute('stroke-width','2.2');
    p.setAttribute('stroke-dasharray','7 7');p.setAttribute('opacity','.7');p.style.animation='dash 1s linear infinite';svg.appendChild(p)})}
const ss=document.createElement('style');ss.textContent='@keyframes dash{to{stroke-dashoffset:-28}}';document.head.appendChild(ss);

function startDrag(e,n,el){sel=n.id;[...canvas.querySelectorAll('.node')].forEach(x=>x.classList.remove('sel'));el.classList.add('sel');renderProps();

function renderProps(){const pop=document.getElementById('pop'),n=nodes.find(x=>x.id===sel);
  if(!n){pop.hidden=true;return}

      if(f.k==='credentials'&&!(t==='openApiSchema'&&n.cfg.egress_auth!=='IAM'))return '';  // 凭证仅 openApiSchema+非IAM
      if(f.k==='endpoint'){
        const map={lambda:['Lambda ARN','如 arn:aws:lambda:us-west-2:123456789012:function:my_fn'],
          openApiSchema:['OpenAPI 服务 URL','如 https://api.example.com'],
          mcpServer:['MCP Server URL','如 https://mcp.example.com/sse'],
          smithyModel:['Smithy 模型 ARN','Smithy 模型资源 ARN']};
        if(map[t]){fl=map[t][0];fhint=map[t][1]}
      }
    }
    // Identity 组件按 入站/出站 认证条件显示字段
    if(n.type==='identity'){
      const ib=n.cfg.inbound_auth,ob=n.cfg.outbound_auth;
      if((f.k==='in_discovery_url'||f.k==='in_audience'||f.k==='in_clients')&&ib!=='JWT')return '';
      if(f.k==='oauth_provider'&&ob!=='oauth')return '';
      if((f.k==='client_id'||f.k==='client_secret'||f.k==='scopes')&&ob!=='oauth')return '';
      if(f.k==='api_key'&&ob!=='apikey')return '';
      if(f.k==='provider_name'&&ob==='none')return '';
    }
    // Gateway 组件按入站认证条件显示字段
    if(n.type==='gateway'){
      const ia=n.cfg.inbound_auth;
      if((f.k==='discovery_url'||f.k==='allowed_audience'||f.k==='allowed_clients')&&ia==='IAM')return '';
    }
    // Policy 组件按编写方式条件显示字段
    if(n.type==='policy'){

    else if(f.t==='checks'){const vals=(v||'').split(',');inp=`<div class="checks">${f.o.map(o=>`<label class="chk"><input type="checkbox" ${vals.includes(o)?'checked':''} onchange="toggleCheck(${n.id},'${f.k}','${o}',this.checked)">${o}</label>`).join('')}</div>`}
    else if(f.t==='skillcode'){const up=n.type==='mcp'?`<label class="upbtn">📎 上传文件<input type="file" accept=".json,.yaml,.yml,.txt" style="display:none" onchange="uploadSkill(${n.id},this,'${f.k}')"></label>`:'';inp=`${up}<textarea class="codearea" oninput="setCfg(${n.id},'${f.k}',this.value)">${(v||'').replace(/</g,'&lt;')}</textarea>`}

    else if(f.t==='textarea')inp=`<textarea oninput="setCfg(${n.id},'${f.k}',this.value)">${v}</textarea>`;
    else inp=`<input value="${(''+v).replace(/"/g,'&quot;')}" oninput="setCfg(${n.id},'${f.k}',this.value)">`;
    let hint=fhint?`<div class="hint">${fhint}</div>`:'';
    if(f.k==='name'&&/[^a-z0-9_]/i.test(v))hint=`<div class="hint warn">⚠ 仅允许字母 / 数字 / 下划线</div>`;
    return `<div class="field"><label>${fl}</label>${inp}${hint}</div>`}).join('');
  pop.hidden=false;positionPop(n)}
function positionPop(n){const pop=document.getElementById('pop'),wrap=document.querySelector('.canvas-wrap');
  const ww=wrap.clientWidth,wh=wrap.clientHeight,pw=pop.offsetWidth||282,ph=pop.offsetHeight||320,nw=(COMPONENTS[n.type].multi?158:188)*viewScale;

function setCfg(id,k,v){nodes.find(x=>x.id===id).cfg[k]=v;published=false;render()}
function uploadSkill(id,input,key){const f=input.files[0];if(!f)return;
  if(f.size>200*1024){toast('文件过大（>200KB）');return}
  const r=new FileReader();r.onload=()=>{const n=nodes.find(x=>x.id===id);n.cfg[key||'code']=r.result;n.cfg._filename=f.name;published=false;render();renderProps();toast('已载入 '+f.name)};r.readAsText(f)}
function uploadSkillZip(id,input){const f=input.files[0];if(!f)return;
  if(!f.name.toLowerCase().endsWith('.zip')){toast('请上传 .zip 压缩包');return}
  if(f.size>5*1024*1024){toast('压缩包过大（>5MB）');return}
  const r=new FileReader();
  r.onload=()=>{
    const buf=new Uint8Array(r.result);
    // 校验 zip 内是否含 SKILL.md：zip 文件名以明文存储于本地/中央目录头，直接扫描字节
    let txt='';for(let i=0;i<buf.length;i++)txt+=String.fromCharCode(buf[i]);
    if(!/\bSKILL\.md\b/i.test(txt)){toast('⚠ 压缩包内未找到 SKILL.md，已拒绝');return}
    // 存 base64 供后端解码
    let bin='';for(let i=0;i<buf.length;i++)bin+=String.fromCharCode(buf[i]);
    const n=nodes.find(x=>x.id===id);n.cfg._zipdata=btoa(bin);n.cfg._zipname=f.name;
    published=false;render();renderProps();toast('✓ 已载入 '+f.name+'（含 SKILL.md）')};
  r.readAsArrayBuffer(f)}
function toggleCheck(id,k,val,checked){const n=nodes.find(x=>x.id===id);let vals=(n.cfg[k]||'').split(',').filter(Boolean);if(checked){if(!vals.includes(val))vals.push(val)}else{vals=vals.filter(v=>v!==val)}n.cfg[k]=vals.join(',');published=false;render()}

function updateStat(rt){const p=document.getElementById('statPill'),tx=document.getElementById('statTxt');

// 增量发布：稳定指纹（FNV-1a 32bit hex），用于比对组件是否变化
function _hash(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)}return (h>>>0).toString(16).padStart(8,'0')}

function gen(){
  const rt=nodes.find(n=>n.type==='runtime');
  if(!rt)return{entry:'# 请先拖入一个 Runtime 组件',deploy:'# 请先拖入一个 Runtime',registry:'{}',policy:'{}',req:''};
  const c=rt.cfg,region=c.region,acct='<ACCOUNT_ID>';
  // 仅纳入配置完整的组件；未配置完整的自动跳过、不发布

function inferProfile(model,region){

function genEntry(c,skills,mcps,ci,br){

  if(br)tools+=`\nfrom bedrock_agentcore.tools.browser_client import browser_session\n\ndef browse(url: str) -> str:\n    """AgentCore 受管浏览器会话 (network=${br.cfg.network})."""\n    with browser_session("${c.region}") as b:\n        return f"browser session ready: {b.session_id}"  # 在此用 Playwright/CDP 驱动\n`;

  if(skills.length)tools+=`\nimport importlib.util, os as _os\n\ndef _load_skills():\n    """加载 skills/ 目录下的技能模块，返回 {name: run_callable}。"""\n    loaded = {}\n    d = _os.path.join(_os.path.dirname(__file__), "skills")\n    if not _os.path.isdir(d):\n        return loaded\n    for fn in _os.listdir(d):\n        if fn.endswith(".py"):\n            name = fn[:-3]\n            try:\n                spec = importlib.util.spec_from_file_location("skill_" + name, _os.path.join(d, fn))\n                mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod)\n                if hasattr(mod, "run"):\n                    loaded[name] = mod.run\n            except Exception as e:\n                print(f"加载技能 {name} 失败: {e}")\n    return loaded\n\nSKILL_FNS = _load_skills()\n`;
  const head=`# ABOUTME: AgentCore 入口 (${c.name}) — 由 AgentCore Studio 生成\nimport os\nfrom typing import Any, Dict\nfrom bedrock_agentcore import BedrockAgentCoreApp\n\nSYSTEM_PROMPT = os.environ.get("SYSTEM_PROMPT") or "You are a helpful AI assistant."\nSKILLS = ${JSON.stringify(sk)}\nTOOLS = ${JSON.stringify(tl)}\n`;
  let logic;
  if(c.framework==='strands')logic=`from strands import Agent\nfrom strands.models.bedrock import BedrockModel\n\nmodel = BedrockModel(model_id="${mid}", temperature=${c.temperature}, max_tokens=${c.max_tokens})\n\ndef process_request(prompt: str, sp: str = SYSTEM_PROMPT) -> str:\n    agent = Agent(model=model, system_prompt=sp)\n    result = agent(prompt)\n    return str(result)\n`;
  else if(c.framework==='claude_sdk')logic=`import anthropic\n_c = anthropic.Anthropic()\n\ndef process_request(prompt: str, sp: str = SYSTEM_PROMPT) -> str:\n    msg = _c.messages.create(model="${mid}", max_tokens=${c.max_tokens}, temperature=${c.temperature},\n        system=sp, messages=[{"role": "user", "content": prompt}])\n    return msg.content[0].text\n`;
  else if(c.framework==='langchain')logic=`from langchain_aws import ChatBedrock\n_llm = ChatBedrock(model_id="${mid}", model_kwargs={"temperature": ${c.temperature}, "max_tokens": ${c.max_tokens}})\n\ndef process_request(prompt: str, sp: str = SYSTEM_PROMPT) -> str:\n    return _llm.invoke(sp + "\\n\\n" + prompt).content\n`;
  else logic=`def process_request(prompt: str, sp: str = SYSTEM_PROMPT) -> str:\n    # === 在此实现你的 agent 逻辑 ===\n    note = f" (已注册技能: {SKILLS}, 工具: {TOOLS})" if SKILLS or TOOLS else ""\n    return f"[{sp[:20]}] 收到: {prompt}{note}"\n`;
  return head+tools+`\napp = BedrockAgentCoreApp()\n\n${logic}\n@app.entrypoint\ndef invoke(payload: Dict[str, Any]) -> Dict[str, Any]:\n    prompt = payload.get("prompt", "")\n    sp = payload.get("system_prompt") or SYSTEM_PROMPT  # 每次请求可覆盖系统提示（改 prompt 即时生效，无需重新部署）\n    if not prompt:\n        return {"error": "No prompt provided", "result": ""}\n    try:\n        return {"result": process_request(prompt, sp)}\n    except Exception as e:\n        return {"error": str(e), "result": ""}\n\n\nif __name__ == "__main__":\n    app.run()\n`}

  const tl=nodes.filter(n=>n.type==='mcp').map(n=>n.cfg.name),sk=nodes.filter(n=>n.type==='skill').map(n=>n.cfg.name);
  const ex=(tl.length||sk.length)?` （已注册工具: ${tl.join(', ')||'无'}; 技能: ${sk.join(', ')||'无'}）`:'';
  return `${sp?'依据设定「'+sp+'」，':''}针对「${p}」给出演示回复。${ex}`}
function setMode(m){const e=document.getElementById('pgMode');
  const map={real:['real','● 实时模型'],cloud:['real','● AWS 云端'],mock:['mock','● 本地模拟'],'cloud-error':['mock','● 云端报错'],error:['mock','● 调用失败']};
  const v=map[m]||['mock','●'];e.className='mode '+v[0];e.textContent=v[1]}
function setSrc(s){if(s==='cloud'&&!deployed){toast('请先点击「发布到云端」');return}
  pgSrc=s;document.getElementById('srcLocal').classList.toggle('on',s==='local');document.getElementById('srcCloud').classList.toggle('on',s==='cloud')}
function addMsg(t,txt){const d=document.createElement('div');d.className='msg '+t;d.textContent=(''+txt).replace(/\\r\\n/g,'\n').replace(/\\n/g,'\n').replace(/\\t/g,'\t');
  const m=document.getElementById('msgs');m.appendChild(d);m.scrollTop=m.scrollHeight}
let curDeployLog=null;
let curDeployHd=null,deployTimer=null,deployStart=0;
function newDeployLog(){const m=document.getElementById('msgs');const d=document.createElement('div');d.className='msg sys deploylog';
  const hd=document.createElement('div');hd.className='dl-hd';hd.textContent='☁️ 云端部署日志（实时）';
  const pre=document.createElement('pre');d.appendChild(hd);d.appendChild(pre);m.appendChild(d);curDeployLog=pre;curDeployHd=hd;m.scrollTop=m.scrollHeight}
function startDeployHeartbeat(){deployStart=Date.now();clearInterval(deployTimer);
  deployTimer=setInterval(()=>{if(!curDeployHd)return;const s=Math.floor((Date.now()-deployStart)/1000),mm=Math.floor(s/60),ss=s%60;
    curDeployHd.textContent=`☁️ 部署进行中… ⏳ 已用 ${mm}m ${ss}s（构建依赖较慢，请耐心等待）`},1000)}
function stopDeployHeartbeat(label){clearInterval(deployTimer);deployTimer=null;if(curDeployHd){const s=Math.floor((Date.now()-deployStart)/1000),mm=Math.floor(s/60),ss=s%60;curDeployHd.textContent=`${label||'☁️ 云端部署日志'} · 用时 ${mm}m ${ss}s`}}
function appendDeployLine(t){if(!curDeployLog)newDeployLog();
  const isStep=/^(>>>|#\s|✅|⚠|☁️)/.test(t);const span=document.createElement('span');
  if(isStep)span.className='dl-step';span.textContent=t+'\n';curDeployLog.appendChild(span);
  const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight}
// ---- 发布管线 trace ----
function buildDeployPlan(){
  const ok=n=>n&&!isIncomplete(n);
  const has=t=>nodes.find(n=>n.type===t&&ok(n));
  const p=[{id:'runtime',label:'Runtime',icon:'⚙️'}];
  if(has('memory'))p.push({id:'memory',label:'Memory',icon:'🧠'});
  const obn=has('observability');if(obn&&obn.cfg.enabled!=='false')p.push({id:'observability',label:'Observability',icon:'📊'});
  const idn=has('identity');if(idn&&(idn.cfg.inbound_auth==='JWT'||idn.cfg.outbound_auth!=='none'))p.push({id:'identity',label:'Identity',icon:'🔐'});
  if(has('gateway')){p.push({id:'gateway',label:'Gateway',icon:'🔌'});
    nodes.filter(n=>n.type==='mcp'&&ok(n)).forEach(n=>p.push({id:'tool:'+n.cfg.name,label:'MCP '+n.cfg.name,icon:'🧰'}))}
  if(has('policy'))p.push({id:'policy',label:'Policy',icon:'🛡️'});
  nodes.filter(n=>n.type==='skill'&&ok(n)).forEach(n=>p.push({id:'skill:'+n.cfg.name,label:n.cfg.name,icon:'✨'}));
  return p}
let traceStages=[],traceEl=null;
function newDeployTrace(){traceStages=buildDeployPlan();const m=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg sys deploytrace';
  d.innerHTML='<div class="dt-hd">🚀 发布管线（'+traceStages.length+' 个组件）</div><div class="dt-row">'+traceStages.map((s,i)=>
    `<div class="dt-stage pending" data-id="${s.id}"><span class="dt-ic">${s.icon}</span><span class="dt-lb">${s.label}</span><span class="dt-ck">✓</span></div>`+
    (i<traceStages.length-1?'<span class="dt-conn"></span>':'')).join('')+'</div>';
  m.appendChild(d);traceEl=d;m.scrollTop=m.scrollHeight}
function advanceTrace(id){if(!traceEl)return;let hit=false;
  traceStages.forEach(s=>{const el=traceEl.querySelector(`.dt-stage[data-id="${CSS.escape(s.id)}"]`);if(!el)return;
    if(s.id===id){el.className='dt-stage active';hit=true}
    else if(!hit&&!el.classList.contains('done')&&!el.classList.contains('skip'))el.className='dt-stage done'})}
function skipTrace(id){if(!traceEl)return;const el=traceEl.querySelector(`.dt-stage[data-id="${CSS.escape(id)}"]`);
  if(el){el.className='dt-stage skip';const ck=el.querySelector('.dt-ck');if(ck)ck.textContent='↷'}}
function completeTrace(){if(!traceEl)return;traceStages.forEach(s=>{const el=traceEl.querySelector(`.dt-stage[data-id="${CSS.escape(s.id)}"]`);if(el&&!el.classList.contains('skip'))el.className='dt-stage done'});
  const skn=traceEl.querySelectorAll('.dt-stage.skip').length;
  const hd=traceEl.querySelector('.dt-hd');if(hd)hd.textContent='🎉 发布完成（'+traceStages.length+' 个组件'+(skn?'，'+skn+' 个未变化已跳过':'')+'）'}
function isHosted(){const h=location.hostname;return !(h==='127.0.0.1'||h==='localhost'||h==='0.0.0.0')}
async function deployCloud(){const rt=nodes.find(n=>n.type==='runtime');if(!rt){toast('请先添加 Runtime');return}
  if(!published){toast('请先「本地发布」并在 Playground 验证后再部署到云端');switchView('cfg');return}
  if(isIncomplete(rt)){toast('⛔ Runtime 未配置完整，无法部署');switchView('cfg');return}
  const skipped=nodes.filter(n=>isIncomplete(n)&&n.type!=='runtime');
  const adv=collectWarnings().filter(w=>!nodes.some(n=>isIncomplete(n)&&w.includes(isIncomplete(n))));
  let pre='真实部署到云端？需 uv + agentcore toolkit + 凭证，耗时数分钟并产生费用。';
  if(isHosted())pre='⚠ 当前为托管环境（如 App Runner）：真实部署资源开销大、可能受限或中断。建议真实部署在本地 Studio 执行；托底演示可直接用「AWS 云端」已就绪 Agent。\n\n仍要在此尝试部署吗？\n\n'+pre;
  if(skipped.length)pre='⏭ 将跳过 '+skipped.length+' 个未配置组件（不部署）：\n'+skipped.map(n=>{const c=COMPONENTS[n.type];return c.ic+(n.cfg.name||n.cfg.gw_name||n.cfg.engine||c.label)}).join('、')+'\n\n'+pre;
  if(adv.length)pre='⚠ 建议（不阻止）：\n'+adv.join('\n')+'\n\n'+pre;
  if(!confirm(pre))return;
  // 改名检测：AgentCore 不能重命名 → 新建 + 旧的成孤儿
  const curNm=rt.cfg.name; let delOld=null;
  if(lastCloudName && lastCloudName!==curNm){
    if(!confirm('⚠ Runtime 名称由「'+lastCloudName+'」改为「'+curNm+'」。\nAgentCore 不支持重命名：这将【新建】一个「'+curNm+'」（全量部署），原「'+lastCloudName+'」仍保留在云端（继续计费）。\n\n继续部署新的「'+curNm+'」吗？（取消则中止）'))return;
    if(confirm('是否在部署成功后【删除】旧的云端 Runtime「'+lastCloudName+'」？\n\n确定 = 删除旧的；取消 = 保留旧的（可稍后手动处理）。\n注：其关联 Memory 不会被删除。'))delOld=lastCloudName;
  }
  toast('☁️ 正在部署到云端…（数分钟）');switchView('play');addMsg('sys','☁️ 开始真实部署到云端…实时日志如下，请耐心等待 2-5 分钟');
  if(skipped.length)addMsg('sys','⏭ 本次跳过 '+skipped.length+' 个未配置组件（不部署）');
  newDeployTrace();newDeployLog();startDeployHeartbeat();
  try{
    const r=await fetch('/api/deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:rt.cfg.name})});
    const jr=await r.json();if(!jr.job_id)throw new Error('未获得部署任务 ID');
    // 轮询式：后台跑 deploy.sh，每 2s 取增量日志/trace，直到 done（绕开 App Runner 流式掐断）
    const jid=jr.job_id;let cursor=0,ok=false,gotDone=false,finalLog='';const deadline=Date.now()+1800000;
    while(true){
      await new Promise(rs=>setTimeout(rs,2000));
      if(Date.now()>deadline)throw new Error('部署超时（30 分钟）');
      let s;try{s=await(await fetch('/api/deploy-status?job_id='+encodeURIComponent(jid)+'&cursor='+cursor)).json()}catch(e){continue}
      if(s.error)throw new Error(s.error);
      for(const ln of (s.lines||[])){const sk=ln.match(/###SKIP###\s*(\S+)/);const sm=ln.match(/###STEP###\s*(\S+)/);if(sk)skipTrace(sk[1]);else if(sm)advanceTrace(sm[1]);else appendDeployLine(ln)}
      if(typeof s.next==='number')cursor=s.next;
      if(s.done){gotDone=true;ok=s.ok;finalLog=s.log||'';break}
    }
    if(!gotDone)throw new Error('部署任务异常结束');
    if(ok){stopDeployHeartbeat('✅ 云端部署完成');completeTrace();deployed=true;setSrc('cloud');addMsg('sys','🎉 全部发布完成！已切换「AWS 云端」，发消息即可验证云端 runtime');
      if(delOld){try{const dr=await fetch('/api/delete-runtime',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:delOld,region:rt.cfg.region})});const dj=await dr.json();addMsg('sys',dj.ok?('🗑 已删除旧 Runtime「'+delOld+'」（其 Memory 仍保留）'):('⚠ 删除旧 Runtime「'+delOld+'」失败：'+(dj.error||'')))}catch(e){addMsg('sys','⚠ 删除旧 Runtime 请求失败：'+e.message)}}
      lastCloudName=curNm}
    else{stopDeployHeartbeat('⚠ 部署未完全成功');const tail=(finalLog||'').split('\n').slice(-12).join('\n');addMsg('sys','⚠ 部署未完全成功，日志末尾：\n'+tail)}}catch(e){stopDeployHeartbeat('⚠ 部署中断');
    if(e.name==='AbortError')addMsg('sys','⚠ 请求超时（15分钟），请刷新后检查云端状态');
    else{addMsg('sys','⚠ 云端部署连接中断：'+e.message);
      if(isHosted())addMsg('sys','💡 当前是托管环境（App Runner）。真实「发布到云端」资源开销大、易受限，建议在本地 Studio（python3 server.py）执行真实部署；本演示环境可直接用已就绪的「AWS 云端」托底 Agent 对话。');
      else addMsg('sys','部署可能仍在后台跑完，可稍后在 AWS 控制台或「AWS 云端」验证 runtime 是否 READY。');}}}

// ---- 导出 ----
function curFile(){const o=gen();return{name:TABS[tab],text:o[tab]}}
function dl(name,text){const b=new Blob([text],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function downloadCurrent(){const f=curFile();dl(f.name,f.text);toast('已下载 '+f.name)}
function copyCurrent(){navigator.clipboard.writeText(curFile().text);toast('已复制')}
function clearCanvas(){if(confirm('清空画布?')){nodes=[];sel=null;published=false;lastCloudName=null;render();renderProps()}}
const SCENARIOS={
  minimal:{label:'极简对话 Agent',desc:'Runtime + Memory，最小可对话',nodes:[['runtime',60,250,{name:'chat_agent',system_prompt:'你是一个友好的对话助手。'}],['memory',380,150]]},
  support:{label:'客服 Agent（带工具）',desc:'Runtime + Memory + Identity + Gateway + 2 个 MCP 工具',nodes:[['runtime',40,250,{name:'support_agent',system_prompt:'你是一个专业的客服助手，可调用工具查询订单与知识库。'}],['memory',320,40],['identity',320,150],['gateway',320,320,{gw_name:'support_gw'}],['mcp',610,260,{name:'order_lookup',description:'查询订单状态'}],['mcp',610,390,{name:'kb_search',description:'检索知识库'}]]},
  analyst:{label:'数据分析 Agent',desc:'Runtime + Code Interpreter + Memory + Observability',nodes:[['runtime',40,210,{name:'analyst_agent',system_prompt:'你是一个数据分析助手，可运行 Python 代码处理数据。'}],['memory',340,110],['codeinterp',340,250,{network:'SANDBOX'}],['observability',340,390]]},
  full:{label:'全家桶（全部组件）',desc:'10 个组件全部展示',nodes:[['runtime',40,285],['memory',300,20],['identity',300,96],['observability',300,172],['gateway',300,248],['policy',300,324],['codeinterp',300,400],['browser',300,476],['mcp',560,210],['skill',560,294]]}
};
// 每个场景/agent 独立 session：保存/恢复 published/deployed/源模式/对话历史
function snapshotSession(){if(curName==null)return;
  sessions[curName]={published,deployed,pgSrc,lastCloudName,chat:document.getElementById('msgs').innerHTML,
    cloudAvail:document.getElementById('srcCloud').classList.contains('avail')}}
function syncSrcPills(){document.getElementById('srcLocal').classList.toggle('on',pgSrc==='local');
  document.getElementById('srcCloud').classList.toggle('on',pgSrc==='cloud')}
function applySession(name,label){
  curName=name;const m=document.getElementById('msgs');
  // 切换时重置进行中的部署/trace 实时引用（旧元素已随对话快照分离）
  curDeployLog=null;curDeployHd=null;traceEl=null;clearInterval(deployTimer);deployTimer=null;
  const st=sessions[name];
  if(st){published=st.published;deployed=st.deployed;pgSrc=st.pgSrc;lastCloudName=st.lastCloudName||null;m.innerHTML=st.chat;
    document.getElementById('srcCloud').classList.toggle('avail',!!st.cloudAvail)}
  else{published=false;deployed=false;pgSrc='local';lastCloudName=null;m.innerHTML='';
    document.getElementById('srcCloud').classList.remove('avail');
    addMsg('sys','🆕 场景「'+(label||name)+'」：先在「本地」对话测试，OK 后再「发布到云端」。每个场景需各自发布；云端对话用的是该场景自己部署的 Agent。')}
  syncSrcPills()}
function loadScenario(key){const sc=SCENARIOS[key]||SCENARIOS.full;
  snapshotSession();
  nodes=[];nid=0;fresh.clear();
  sc.nodes.forEach(([t,x,y,ov])=>{const c=COMPONENTS[t],cfg={};c.fields.forEach(f=>cfg[f.k]=f.d);
    if(c.multi){const k=c.fields[0].k;cfg[k]=cfg[k]+'_'+(nodes.filter(n=>n.type===t).length+1)}
    if(ov)Object.assign(cfg,ov);
    nodes.push({id:++nid,type:t,x,y,cfg});fresh.add(nid)});
  sel=null;render();[...canvas.querySelectorAll('.node')].forEach((el,i)=>{el.style.animation='none';void el.offsetWidth;el.classList.add('enter');el.style.animationDelay=(i*70)+'ms'});renderProps();
  const rt=nodes.find(n=>n.type==='runtime');
  applySession(rt?(rt.cfg.name||('scenario:'+key)):('scenario:'+key),sc.label);
  toast('已载入场景：'+sc.label)}
function loadSample(){loadScenario('full')}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1900)}
render();loadSample();
</script>
